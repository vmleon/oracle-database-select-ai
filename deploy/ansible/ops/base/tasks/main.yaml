---
- name: Set SQLPATH in bashrc
  ansible.builtin.lineinfile:
    path: /home/opc/.bashrc
    line: "export SQLPATH=$HOME"
    state: present
  become_user: opc

- name: Install JDK 23 headless
  ansible.builtin.package:
    name: jdk-23-headless
    update_cache: yes

- name: Install sqlcl
  ansible.builtin.package:
    name: sqlcl
    update_cache: yes

- name: Copy login.sql file
  ansible.builtin.copy:
    src: ../files/login.sql
    dest: /home/opc/login.sql
    owner: opc
    group: opc
    mode: '0640'

- name: Create conn directory
  ansible.builtin.file:
    path: /home/opc/conn
    state: directory
    owner: opc
    group: opc
    mode: '0744'

- name: Copy conn/admin.sql template
  ansible.builtin.template:
    src: ../files/conn/admin.sql.j2
    dest: /home/opc/conn/admin.sql
    owner: opc
    group: opc
    mode: '0640'

- name: Create init directory
  ansible.builtin.file:
    path: /home/opc/init
    state: directory
    owner: opc
    group: opc
    mode: '0744'

- name: Copy init SQL files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /home/opc/init/
    owner: opc
    group: opc
    mode: '0640'
  with_fileglob:
    - ../files/init/*.sql

- name: Render Select AI profile SQL scripts
  ansible.builtin.template:
    src: ../files/init/create_profile_select_ai.sql.j2
    dest: "/home/opc/init/create_profile_{{ item.name }}.sql"
    owner: opc
    group: opc
    mode: '0640'
  vars:
    select_ai_profile_name: "{{ item.profile }}"
    select_ai_extra_attrs: "{{ item.extra }}"
  loop:
    - { name: select_ai, profile: GENAI_SELECT_AI, extra: "" }
    - { name: rag, profile: GENAI_RAG, extra: ',\n            "vector_index_name": "HR_POLICY_INDEX"' }

- name: Create queries directory
  ansible.builtin.file:
    path: /home/opc/queries
    state: directory
    owner: opc
    group: opc
    mode: '0744'

- name: Copy queries SQL files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /home/opc/queries/
    owner: opc
    group: opc
    mode: '0640'
  with_fileglob:
    - ../files/queries/*.sql

- name: Create ADMIN connection
  ansible.builtin.command: "sql /nolog @/home/opc/conn/admin.sql"
  become_user: opc

- name: Add Network ACL
  ansible.builtin.command: "sql -name admin -s @/home/opc/init/network_acl.sql"
  become_user: opc
  register: network_acl_result
  failed_when: "'ORA-' in network_acl_result.stdout or network_acl_result.rc != 0"

- name: Show Network ACL output
  ansible.builtin.debug:
    msg: "{{ network_acl_result.stdout_lines }}"

- name: Enable Resource Principal
  ansible.builtin.command: "sql -name admin -s @/home/opc/init/enable_resource_principal.sql"
  become_user: opc
  register: resource_principal_result
  failed_when: "'ORA-' in resource_principal_result.stdout or resource_principal_result.rc != 0"

- name: Show Enable Resource Principal output
  ansible.builtin.debug:
    msg: "{{ resource_principal_result.stdout_lines }}"

- name: Unlock HR schema
  ansible.builtin.command: "sql -name admin -s @/home/opc/init/unlock_hr.sql"
  become_user: opc
  register: unlock_hr_result
  failed_when: "'ORA-' in unlock_hr_result.stdout or unlock_hr_result.rc != 0"

- name: Show Unlock HR output
  ansible.builtin.debug:
    msg: "{{ unlock_hr_result.stdout_lines }}"

- name: Add HR table comments
  ansible.builtin.command: "sql -name admin -s @/home/opc/init/add_comments.sql"
  become_user: opc
  register: add_comments_result
  failed_when: "'ORA-' in add_comments_result.stdout or add_comments_result.rc != 0"

- name: Show Add Comments output
  ansible.builtin.debug:
    msg: "{{ add_comments_result.stdout_lines }}"

- name: Create Select AI profiles
  ansible.builtin.command: "sql -name admin -s @/home/opc/init/create_profile_{{ item }}.sql"
  become_user: opc
  register: profiles_result
  failed_when: "'ORA-' in profiles_result.stdout or profiles_result.rc != 0"
  loop:
    - select_ai
    - rag

- name: Show Select AI profiles output
  ansible.builtin.debug:
    msg: "{{ profiles_result.results | map(attribute='stdout_lines') | list }}"

- name: Render vector index creation SQL script
  ansible.builtin.template:
    src: ../files/init/create_vector_index.sql.j2
    dest: /home/opc/init/create_vector_index.sql
    owner: opc
    group: opc
    mode: '0640'

- name: Create Vector Index for RAG
  ansible.builtin.command: "sql -name admin -s @/home/opc/init/create_vector_index.sql"
  become_user: opc
  register: vector_index_result
  failed_when: "'ORA-' in vector_index_result.stdout or vector_index_result.rc != 0"

- name: Show Vector Index output
  ansible.builtin.debug:
    msg: "{{ vector_index_result.stdout_lines }}"

- name: Render agent creation SQL script
  ansible.builtin.template:
    src: ../files/init/create_agent.sql.j2
    dest: /home/opc/init/create_agent.sql
    owner: opc
    group: opc
    mode: '0640'
  vars:
    select_ai_profile_name: GENAI_SELECT_AI

- name: Create Select AI Agent
  ansible.builtin.command: "sql -name admin -s @/home/opc/init/create_agent.sql"
  become_user: opc
  register: agent_result
  failed_when: "'ORA-' in agent_result.stdout or agent_result.rc != 0"

- name: Show Select AI Agent output
  ansible.builtin.debug:
    msg: "{{ agent_result.stdout_lines }}"
